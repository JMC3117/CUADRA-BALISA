<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cuadra Balisa">
  <meta name="theme-color" content="#196B24">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <title>Cuadra Monte de Balisa</title>
</head>
<body style="margin:0;padding:0;background:#F5EDE0;">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body,html{-webkit-font-smoothing:antialiased;}
.app{background:#F5EDE0;min-height:400px;font-family:var(--font-sans);}

/* HEADER */
.hdr{background:#196B24;padding:14px 18px 12px;display:flex;align-items:center;gap:14px;border-bottom:3px solid #EACBB4;}
.hdr-logo{width:42px;height:42px;object-fit:contain;flex-shrink:0;}
.hdr-text{flex:1;}
.ht{color:#EACBB4;font-size:19px;font-weight:700;letter-spacing:0.02em;line-height:1.2;}
.hs{color:rgba(234,203,180,.65);font-size:10px;margin-top:2px;letter-spacing:0.03em;text-transform:uppercase;}

/* BODY */
.body{padding:14px;}

/* CARDS GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:10px;}
.card{background:#fff;border:1px solid rgba(25,107,36,0.12);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .15s;}
.card:hover{border-color:#196B24;}
.cph{width:100%;aspect-ratio:1;background:#EDE0CF;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.cph img{width:100%;height:100%;object-fit:cover;}
.ci{padding:7px 9px 8px;}
.cn{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1a1a1a;letter-spacing:0.01em;}
.csub{display:flex;align-items:center;gap:3px;margin-top:2px;flex-wrap:wrap;}

/* INPUTS */
input,select,textarea{width:100%;padding:7px 9px;border:1px solid rgba(25,107,36,0.2);border-radius:7px;font-size:13px;background:#fff;color:var(--color-text-primary);font-family:var(--font-sans);}
input:focus,select:focus,textarea:focus{outline:none;border-color:#196B24;}
textarea{resize:vertical;}

/* LABELS */
.fl{font-size:10px;color:#196B24;margin-bottom:3px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;}
.fv{font-size:13px;color:var(--color-text-primary);}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px;}

/* SECTION HEADERS */
.sec{font-size:10px;font-weight:700;color:#fff;background:#196B24;margin:14px 0 8px;padding:4px 10px;letter-spacing:0.06em;text-transform:uppercase;border-radius:4px;display:block;}

/* BUTTONS */
.btn{padding:6px 13px;border-radius:7px;border:1px solid rgba(25,107,36,0.25);cursor:pointer;font-size:12px;background:#fff;color:#196B24;font-weight:600;}
.btn:hover{background:#f0f8f0;}
.bp{background:#196B24!important;color:#EACBB4!important;border-color:#196B24!important;}
.bp:hover{background:#145a1e!important;}
.bsm{padding:4px 10px;font-size:11px;}
.brow{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap;}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:13px;background:rgba(25,107,36,0.07);border-radius:8px;padding:3px;}
.tab{padding:4px 11px;border-radius:6px;border:none;cursor:pointer;font-size:12px;background:transparent;color:#196B24;font-weight:600;letter-spacing:0.01em;}
.tab.on{background:#196B24;color:#EACBB4;}

/* COMMENTS */
.com{background:#fff;border-radius:8px;border:1px solid rgba(25,107,36,0.12);padding:8px 10px;margin-bottom:5px;font-size:12px;}
.com.vet{border-left:3px solid #196B24;}
.cm{font-size:10px;color:#196B24;font-weight:700;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.05em;}

/* TREE NODES */
.trn{background:#fff;border:1px solid rgba(25,107,36,0.2);border-radius:8px;padding:6px 9px;text-align:center;cursor:pointer;min-width:82px;max-width:105px;}
.trn.cur{border:2px solid #196B24;background:#f0f8f0;}
.trnm{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* STATUS SELECTOR */
.ssel{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.sopt{padding:4px 10px;border-radius:999px;cursor:pointer;font-size:11px;font-weight:700;border:2px solid transparent;}

/* SUMMARY CHIPS */
.sum{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px;}
.chip{display:inline-flex;align-items:center;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;}

/* PROFILE PHOTO */
.pph{width:88px;height:88px;border-radius:10px;background:#EDE0CF;display:flex;align-items:center;justify-content:center;overflow:hidden;border:2px solid rgba(25,107,36,0.2);flex-shrink:0;}
.pph img{width:100%;height:100%;object-fit:cover;}

/* NOTE BOX */
.notebox{background:#fff;border-radius:8px;border:1px solid rgba(25,107,36,0.12);padding:9px 11px;font-size:12px;white-space:pre-wrap;color:var(--color-text-secondary);min-height:38px;}

/* INFO ROW */
.inf-row{display:flex;align-items:center;gap:5px;font-size:11px;color:#555;margin-top:2px;}
.inf-row span.lbl{color:#196B24;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:0.05em;min-width:52px;}

/* HERRAJE */
.hrr{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#fff;border:1px solid rgba(25,107,36,0.12);border-radius:8px;margin-bottom:10px;}

/* SEARCH */
.search-row{display:flex;gap:7px;margin-bottom:11px;}

.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}

.lb{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.93);z-index:9999;flex-direction:column;align-items:center;justify-content:center;}
.lb.open{display:flex;}
.lb img{max-width:94vw;max-height:78vh;object-fit:contain;border-radius:8px;display:block;}
.lb-x{position:absolute;top:14px;right:16px;color:#fff;font-size:36px;line-height:1;cursor:pointer;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.15);border-radius:50%;}
.lb-cap{color:#EACBB4;font-size:13px;margin-top:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;text-align:center;}
.lb-nav{display:flex;gap:16px;margin-top:14px;}
.lb-nav button{color:#fff;background:rgba(255,255,255,0.18);border:none;border-radius:8px;padding:9px 22px;font-size:14px;cursor:pointer;font-weight:700;min-height:44px;}
</style>


<div class="lb" id="lb">
  <div class="lb-x" id="lb-x">&#x2715;</div>
  <img id="lb-img" src="" alt="">
  <div class="lb-cap" id="lb-cap"></div>
  <div class="lb-nav">
    <button id="lb-prev">&#8592; Anterior</button>
    <button id="lb-next">Siguiente &#8594;</button>
  </div>
</div>

let H=[],view='list',selId=null,ed=false,ef={},pt='info',srch='',fst='',addF={};

function def_horse(){return {id:uid(),name:'',sex:'Hembra',dob:'',coat:'Castaño',ueln:'',elecId:'',region:'',status:'Potro/a',motherId:null,fatherId:null,motherName:'',fatherName:'',photos:[],notes:'',vetNotes:'',vetUpdates:[],comments:[],passportPhoto:null,localizacion:'Monte Balisa',locCustom:'',propietario:'Monte Balisa',propCustom:'',eventDate:''};}

async function loadD(){try{const r=await window.storage.get('hbal_v6');if(r&&r.value){H=JSON.parse(r.value);for(const h of H){h.motherName=h.motherName||'';h.fatherName=h.fatherName||'';h.vetNotes=h.vetNotes||'';h.localizacion=h.localizacion||'Monte Balisa';h.locCustom=h.locCustom||'';h.propietario=h.propietario||'Monte Balisa';h.propCustom=h.propCustom||'';h.eventDate=h.eventDate||'';try{const pr=await window.storage.get('ph_'+h.id);if(pr&&pr.value)h.photos=JSON.parse(pr.value);}catch(x){}try{const ppr=await window.storage.get('pp_'+h.id);if(ppr&&ppr.value)h.passportPhoto=ppr.value;}catch(x){}}return;}}catch(x){}H=JSON.parse(JSON.stringify(INIT));}
async function saveD(){try{await window.storage.set('hbal_v6',JSON.stringify(H.map(h=>{return {...h,photos:[],passportPhoto:null};})));for(const h of H){if(h.photos&&h.photos.length)try{await window.storage.set('ph_'+h.id,JSON.stringify(h.photos));}catch(x){}if(h.passportPhoto)try{await window.storage.set('pp_'+h.id,h.passportPhoto);}catch(x){}}}catch(x){}}

function ag(dob){if(!dob)return'';const y=Math.floor((new Date()-new Date(dob))/(365.25*864e5));return y+'a';}
function fd(d){if(!d)return'-';const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2);}
function gsel(){return H.find(h=>h.id===selId)||{};}
function ec(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function bdg(s,sm){const st=SS[s]||{bg:'#eee',c:'#666'};return`<span style="display:inline-block;border-radius:999px;padding:${sm?'1px 5px':'2px 8px'};font-size:${sm?9:11}px;font-weight:600;background:${st.bg};color:${st.c}">${ec(s)}</span>`;}
function dot(coat,sz){sz=sz||8;return`<span style="display:inline-block;width:${sz}px;height:${sz}px;border-radius:50%;background:${CC[coat]||'#888'};margin-right:3px;vertical-align:middle"></span>`;}
function sexIcon(sex){return sex==='Macho'?'<span style="color:#1565C0;font-size:13px;font-weight:700">♂</span>':'<span style="color:#c2185b;font-size:13px;font-weight:700">♀</span>';}
function hico(coat){const c=CC[coat]||'#888';return`<svg width="52" height="52" viewBox="0 0 60 60"><ellipse cx="28" cy="40" rx="16" ry="12" fill="${c}" opacity=".85"/><circle cx="36" cy="22" r="11" fill="${c}"/><ellipse cx="42" cy="15" rx="4" ry="6" fill="${c}" transform="rotate(-20 42 15)"/><ellipse cx="23" cy="52" rx="3" ry="5" fill="${c}" opacity=".9"/><ellipse cx="31" cy="53" rx="3" ry="5" fill="${c}" opacity=".9"/><circle cx="38" cy="19" r="2" fill="white" opacity=".8"/><circle cx="39" cy="19" r="1" fill="#333"/></svg>`;}

function rHdr(){return`<div class="hdr"><img src="${LOGO_SRC}" class="hdr-logo" alt="Balisa"><div class="hdr-text"><div class="ht">Cuadra Monte de Balisa</div><div class="hs">Gestión Equina &nbsp;·&nbsp; ${H.length} animales</div></div></div>`;}

function horseNames(){return H.map(h=>h.name).join(',');}

function rList(){
  const fil=H.filter(h=>(!srch||h.name.toLowerCase().includes(srch.toLowerCase())||h.coat.toLowerCase().includes(srch.toLowerCase()))&&(!fst||h.status===fst));
  let sum='';STATS.forEach(s=>{const cnt=H.filter(h=>h.status===s).length;if(!cnt)return;const st=SS[s];sum+=`<span class="chip" style="background:${st.bg};color:${st.c};border:${fst===s?'2px solid '+st.c:'2px solid transparent'}" data-a="fst" data-v="${ec(s)}">${ec(s)} ${cnt}</span>`;});
  const males=H.filter(h=>h.sex==='Macho').length,fem=H.filter(h=>h.sex==='Hembra').length;
  let cards='';
  if(!fil.length){cards=`<div style="text-align:center;padding:32px;font-size:13px;color:var(--color-text-secondary)">${srch||fst?'Sin resultados':'Sin caballos'}</div>`;}
  else fil.forEach(h=>{
    const ph2=h.photos&&h.photos[0]?`<img src="${h.photos[0]}" style="cursor:pointer">`:`<div style="padding:4px">${hico(h.coat)}</div>`;const missingDoc=!h.ueln&&!h.elecId;
    cards+=`<div class="card" data-a="sel" data-v="${h.id}"><div class="cph">${ph2}</div><div class="ci"><div class="cn" title="${ec(h.name)}">${ec(h.name)}</div><div class="csub">${sexIcon(h.sex)}${bdg(h.status,true)}</div><div style="font-size:10px;color:#888;margin-top:3px">${dot(h.coat)}${ec(h.coat)}${ag(h.dob)?' · '+ag(h.dob):''}</div>${missingDoc?`<div style="font-size:9px;color:#856404;background:#fff3cd;border-radius:3px;padding:2px 5px;margin:3px 0 1px;font-weight:700">⚠ Doc. ID Pendiente</div>`:''}</div></div>`;
  });
  return`<div class="sum">${sum}</div><div style="font-size:11px;color:#888;margin-bottom:8px;font-weight:500">♂ ${males} machos &nbsp;·&nbsp; ♀ ${fem} yeguas &nbsp;·&nbsp; ${H.length} total</div><div class="search-row"><button class="btn bsm bp" data-a="add">+ Nuevo</button>${fst?`<button class="btn bsm" style="border-color:rgba(25,107,36,0.3)" data-a="clrfst">✕ Filtro</button>`:''}<input id="si" value="${ec(srch)}" placeholder="Buscar por nombre o pelaje..." style="flex:1"></div><div class="grid">${cards}</div>`;
}

function rTree(h){
  const g=id=>id?H.find(x=>x.id===id):null;
  const mo=g(h.motherId),fa=g(h.fatherId),ch=H.filter(x=>x.motherId===h.id||x.fatherId===h.id);
  const mmo=mo?g(mo.motherId):null,mfa=mo?g(mo.fatherId):null,fmo=fa?g(fa.motherId):null,ffa=fa?g(fa.fatherId):null;
  const nd=(x,cur)=>{if(!x)return'';const s=SS[x.status]||{bg:'#eee',c:'#333'};return`<div class="trn${cur?' cur':''}" data-a="${cur?'':'nav'}" data-v="${x.id}"><div class="trnm" title="${ec(x.name)}">${ec(x.name)}</div><div style="font-size:9px;color:var(--color-text-secondary);margin-top:1px">${dot(x.coat,6)}${ec(x.coat)}</div><div style="margin-top:2px"><span style="background:${s.bg};color:${s.c};border-radius:999px;padding:1px 4px;font-size:9px">${ec(x.status)}</span></div></div>`;};
  const exNd=(name)=>{if(!name)return'';return`<div class="trn" style="opacity:.7"><div class="trnm" title="${ec(name)}">${ec(name)}</div><div style="font-size:9px;color:var(--color-text-secondary)">Externo</div></div>`;};
  const vl=`<div style="width:1px;background:var(--color-border-secondary);height:12px;margin:0 auto"></div>`;
  const moNode=mo?nd(mo):h.motherName?exNd(h.motherName):null;
  const faNode=fa?nd(fa):h.fatherName?exNd(h.fatherName):null;
  let t='<div style="overflow-x:auto;padding:4px 0">';
  if(mmo||mfa||fmo||ffa)t+=`<div style="display:flex;gap:5px;justify-content:center;align-items:flex-start"><div style="display:flex;gap:4px">${mmo?nd(mmo):''}${mfa?nd(mfa):''}</div><div style="flex:2"></div><div style="display:flex;gap:4px">${fmo?nd(fmo):''}${ffa?nd(ffa):''}</div></div>${vl}`;
  if(moNode||faNode)t+=`<div style="display:flex;gap:6px;justify-content:center;align-items:center">${moNode||''}${moNode&&faNode?'<div style="flex:1;height:1px;background:var(--color-border-secondary);align-self:center"></div>':''}${faNode||''}</div>${vl}`;
  t+=`<div style="display:flex;justify-content:center">${nd(h,true)}</div>`;
  if(ch.length)t+=vl+`<div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap">${ch.map(c=>nd(c)).join('')}</div>`;
  if(!moNode&&!faNode&&!ch.length)t+=`<div style="text-align:center;font-size:12px;color:var(--color-text-secondary);margin-top:8px;padding:12px">Sin relaciones. Edita el perfil para añadir padres.</div>`;
  return t+'</div>';
}

function attachEv(){
  const app=document.getElementById('app');app.onclick=handleClick;
  // Photo lightbox delegation
  app.addEventListener('click',function(e){
    const t=e.target;
    if(!t.classList.contains('lb-thumb'))return;
    e.stopPropagation();
    const hid=t.dataset.hid;
    const idx=parseInt(t.dataset.idx||0);
    const horse=H.find(function(x){return x.id===hid;});
    if(horse&&horse.photos&&horse.photos.length){lbOpen(horse.photos,idx,horse.name);}
  },true);
  const si=document.getElementById('si');
  if(si)si.oninput=function(){srch=this.value;const p2=this.selectionStart;render();const ni=document.getElementById('si');if(ni){ni.focus();try{ni.setSelectionRange(p2,p2);}catch(x){}}};
  // Radio listeners for loc/prop in edit mode
  document.querySelectorAll('input[name="loc"],input[name="prop"],input[name="aloc"],input[name="aprop"]').forEach(r=>{
    r.onchange=function(){
      if(this.name==='aloc'||this.name==='aprop'){captureAddFields();render();}
      else{
        if(this.name==='loc')ef.localizacion=this.value;
        else ef.propietario=this.value;
        render();
      }
    };
  });
}
function gv(id){const el=document.getElementById(id);return el?el.value:null;}
function handleClick(ev){
  const el=ev.target.closest('[data-a]');if(!el)return;
  const a=el.dataset.a,v=el.dataset.v;
  switch(a){
    case 'sel':case 'nav':selId=v;view='profile';ed=false;ef={};pt='info';render();break;
    case 'back':view='list';ed=false;ef={};render();break;
    case 'add':addF=def_horse();view='add';render();break;
    case 'edit':ef={...gsel()};ed=true;render();break;
    case 'cedit':ed=false;ef={};render();break;
    case 'save':doSave();break;
    case 'del':if(confirm('¿Eliminar este caballo?')){H=H.filter(x=>x.id!==v);saveD();view='list';render();}break;
    case 'pt':pt=v;render();break;
    case 'fst':fst=fst===v?'':v;render();break;
    case 'clrfst':fst='';render();break;
    case 'efst':ef.status=v;render();break;
    case 'afst':captureAddFields();addF.status=v;render();break;
    case 'addvet':doAddVet();break;
    case 'addcom':doAddCom();break;
    case 'rmph':const pi=parseInt(v);ef.photos=(ef.photos||gsel().photos||[]).filter((_,j)=>j!==pi);render();break;
    case 'addph':mkFI('photo');break;
    case 'addpp':mkFI('pass');break;
    case 'rmpp':const h2=gsel();H=H.map(x=>x.id===h2.id?{...x,passportPhoto:null}:x);if(ed)ef.passportPhoto=null;saveD();render();break;
    case 'svadd':captureAddFields();doSaveAdd();break;
  }
}

function resolveParent(name,sex){
  if(!name)return{id:null,name:''};
  const match=H.find(x=>x.name.toUpperCase()===name.toUpperCase()&&x.sex===sex);
  return match?{id:match.id,name:match.name}:{id:null,name:name};
}

function doSave(){
  const h=gsel();
  const nm=gv('ef-nm'),sx=gv('ef-sx'),db=gv('ef-db'),ct=gv('ef-ct'),rg=gv('ef-rg'),ul=gv('ef-ul'),ei=gv('ef-ei'),moRaw=gv('ef-mo'),faRaw=gv('ef-fa'),nt=gv('ef-nt'),vn=gv('ef-vn'),ed2=gv('ef-ed'),lc=gv('loc-custom'),pc=gv('prop-custom');
  const locEl=document.querySelector('input[name="loc"]:checked');
  const propEl=document.querySelector('input[name="prop"]:checked');
  const moR=resolveParent(moRaw,'Hembra'),faR=resolveParent(faRaw,'Macho');
  const updated={...h,...ef,
    name:(nm||ef.name||h.name||'').toUpperCase(),sex:sx||ef.sex||h.sex,dob:db??ef.dob??h.dob,
    coat:ct||ef.coat||h.coat,region:rg??ef.region??h.region,ueln:ul??ef.ueln??h.ueln,elecId:ei??ef.elecId??h.elecId,
    motherId:moR.id,motherName:moR.name||'',fatherId:faR.id,fatherName:faR.name||'',
    notes:nt!==null?nt:(ef.notes!==undefined?ef.notes:h.notes||''),
    vetNotes:vn!==null?vn:(ef.vetNotes!==undefined?ef.vetNotes:h.vetNotes||''),
    localizacion:locEl?locEl.value:(ef.localizacion||h.localizacion||'Monte Balisa'),
    locCustom:lc!==null?lc:(ef.locCustom||h.locCustom||''),
    propietario:propEl?propEl.value:(ef.propietario||h.propietario||'Monte Balisa'),
    propCustom:pc!==null?pc:(ef.propCustom||h.propCustom||''),
    eventDate:ed2!==null?ed2:(ef.eventDate||h.eventDate||''),
    photos:ef.photos||h.photos||[]};
  H=H.map(x=>x.id===h.id?updated:x);ed=false;ef={};saveD();render();
}
function doAddVet(){const t=(gv('nv-i')||'').trim();if(!t)return;const h=gsel();H=H.map(x=>x.id===h.id?{...x,vetUpdates:[...(x.vetUpdates||[]),{id:uid(),date:new Date().toISOString().split('T')[0],text:t}]}:x);saveD();render();}
function doAddCom(){const t=(gv('nc-i')||'').trim();if(!t)return;const h=gsel();H=H.map(x=>x.id===h.id?{...x,comments:[...(x.comments||[]),{id:uid(),date:new Date().toISOString().split('T')[0],text:t}]}:x);saveD();render();}
function mkFI(type){let fi=document.getElementById('fi-'+type);if(!fi){fi=document.createElement('input');fi.type='file';fi.id='fi-'+type;fi.accept='image/*';fi.style.cssText='position:absolute;width:1px;height:1px;opacity:0';fi.onchange=function(ev){const file=ev.target.files[0];if(!file)return;const r=new FileReader();r.onload=function(re){if(type==='photo'){if(view==='profile'&&ed){ef.photos=[...(ef.photos||gsel().photos||[]),re.target.result];render();}}else{const h=gsel();H=H.map(x=>x.id===h.id?{...x,passportPhoto:re.target.result}:x);if(ed)ef.passportPhoto=re.target.result;saveD();render();}};r.readAsDataURL(file);fi.value='';}; document.getElementById('app').appendChild(fi);}fi.click();}
function doSaveAdd(){
  if(!addF.name){alert('El nombre es obligatorio');return;}
  const moR=resolveParent(addF.motherName,'Hembra'),faR=resolveParent(addF.fatherName,'Macho');
  addF.motherId=moR.id;addF.fatherId=faR.id;
  H.push({...addF});selId=addF.id;view='profile';pt='info';saveD();render();
}
loadD().then(render);

// LIGHTBOX
var _lbP=[],_lbI=0,_lbN='';
function lbOpen(photos,idx,name){
  if(!photos||!photos.length)return;
  _lbP=photos;_lbI=idx;_lbN=name;
  document.getElementById('lb-img').src=photos[idx];
  document.getElementById('lb-cap').textContent=name+(photos.length>1?' ('+(idx+1)+'/'+photos.length+')':'');
  document.getElementById('lb').className='lb open';
  document.body.style.overflow='hidden';
}
function lbClose(){document.getElementById('lb').className='lb';document.body.style.overflow='';}
function lbNext(){_lbI=(_lbI+1)%_lbP.length;lbOpen(_lbP,_lbI,_lbN);}
function lbPrev(){_lbI=(_lbI-1+_lbP.length)%_lbP.length;lbOpen(_lbP,_lbI,_lbN);}
document.getElementById('lb-x').onclick=lbClose;
document.getElementById('lb-next').onclick=lbNext;
document.getElementById('lb-prev').onclick=lbPrev;
document.getElementById('lb').onclick=function(e){if(e.target===this)lbClose();};
document.addEventListener('keydown',function(e){
  if(!document.getElementById('lb').classList.contains('open'))return;
  if(e.key==='Escape')lbClose();
  if(e.key==='ArrowRight')lbNext();
  if(e.key==='ArrowLeft')lbPrev();
});
// SW
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(){});});
}
